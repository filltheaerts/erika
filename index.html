<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RH&VV Q&A — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=15">
</head>
<body class="login-page">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <h1>RH&VV<span>.</span></h1>
        <p>Q&A Board</p>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>ID</label>
          <input type="text" id="loginId" required autocomplete="username" placeholder="Enter your ID">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPw" required autocomplete="current-password" placeholder="Enter your password">
        </div>
        <p id="loginError" style="color:#E53935; font-size:.85rem; margin-bottom:12px; display:none;">
          Invalid ID or password.
        </p>
        <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;">Login</button>
      </form>
    </div>
    <p class="login-footer">&copy; 2026 RH&VV Q&A</p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js?v=15"></script>
  <script>
    // If already signed in, skip to board
    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = 'board.html';
    });

    function handleLogin(e) {
      e.preventDefault();
      const id = document.getElementById('loginId').value.trim();
      const pw = document.getElementById('loginPw').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const email = id + '@erika-board.com';
      firebase.auth().signInWithEmailAndPassword(email, pw)
        .then(() => {
          window.location.href = 'board.html';
        })
        .catch(() => {
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Login';
          setTimeout(() => errorEl.style.display = 'none', 3000);
        });
    }
  </script>
</body>
</html>
